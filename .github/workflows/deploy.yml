# =====================================================================
# FILE: .github/workflows/deploy.yml
# DESCRIPTION: Production CI/CD workflow deploying to Google Cloud Run.
# =====================================================================

name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: YOUR_GCP_PROJECT_ID # Replace with your GCP Project ID
  GAR_LOCATION: us-central1
  REPOSITORY: agricore-repo
  REGION: us-central1
  BACKEND_SERVICE: agricore-backend
  FRONTEND_SERVICE: agricore-frontend

jobs:
  deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 1. Google Authentication (Using Workload Identity Federation)
      # -----------------------------------------------------------------
      # Replace the provider and service_account with your configured GCP values
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com

      # -----------------------------------------------------------------
      # 2. Configure Docker credentials for Artifact Registry
      # -----------------------------------------------------------------
      - name: Docker Auth Config
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # -----------------------------------------------------------------
      # 3. Build and Push Backend Container Image
      # -----------------------------------------------------------------
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SERVICE }}:latest

      # -----------------------------------------------------------------
      # 4. Build and Push Frontend Container Image
      # -----------------------------------------------------------------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:latest

      # -----------------------------------------------------------------
      # 5. Deploy Backend Container to Google Cloud Run
      # -----------------------------------------------------------------
      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --max-instances=10
            --min-instances=1
            --cpu=1
            --memory=1Gi
            --concurrency=80
          # References secrets managed in Google Secret Manager to be injected at runtime
          env_vars: |
            HOST=0.0.0.0
            PORT=8080
            DATABASE_URL=sqlite:///../data/agricore.db
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            NVIDIA_API_KEY=NVIDIA_API_KEY:latest
            JWT_SECRET=JWT_SECRET:latest
            JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest

      # -----------------------------------------------------------------
      # 6. Deploy Frontend Container to Google Cloud Run
      # -----------------------------------------------------------------
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --max-instances=10
            --min-instances=0
            --cpu=1
            --memory=512Mi
